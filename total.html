<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totaux mensuels - Uma Musume Club Dashboard</title>
  <style>
    :root{
      --bg:#0f1220;
      --panel:#171b2e;
      --panel-2:#1d233b;
      --border:#2b3354;
      --text:#edf1ff;
      --muted:#9ca8d4;
      --link:#aecdff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(180deg,#0d1020 0%, #131831 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    .container{
      width:min(1320px, calc(100% - 24px));
      margin:20px auto 40px;
    }
    .header{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    h1{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.1;
    }
    .subtitle{
      color:var(--muted);
      margin:0;
    }
    .top-links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .top-links a{
      text-decoration:none;
      color:var(--text);
      background:rgba(23,27,46,.94);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
    }
    .card{
      background:rgba(23,27,46,.94);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 8px 30px rgba(0,0,0,.25);
    }
    .summary{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .summary-item{padding:16px}
    .summary-item .label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:6px;
    }
    .summary-item .value{
      font-size:24px;
      font-weight:800;
      line-height:1.15;
      overflow-wrap:anywhere;
    }
    .table-wrap{overflow-x:auto}
    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }
    th, td{
      padding:12px 12px;
      border-bottom:1px solid rgba(43,51,84,.75);
      text-align:left;
      vertical-align:middle;
      font-size:14px;
    }
    th{
      background:rgba(29,35,59,.98);
      font-size:13px;
      color:var(--text);
      white-space:normal;
      line-height:1.25;
      word-break:break-word;
    }
    th.sortable{
      cursor:pointer;
      user-select:none;
    }
    th .arrow{
      margin-left:6px;
      color:var(--muted);
      font-size:11px;
    }
    tbody tr:hover{background:rgba(141,180,255,.06)}
    .month-link{
      color:var(--link);
      text-decoration:none;
      font-weight:700;
    }
    .month-link:hover{text-decoration:underline}
    .empty{
      padding:24px;
      color:var(--muted);
    }
    @media (max-width:1100px){
      .summary{grid-template-columns:repeat(2, minmax(0,1fr))}
    }
    @media (max-width:640px){
      .summary{grid-template-columns:1fr}
      h1{font-size:24px}
      .container{width:min(100%, calc(100% - 16px))}
      table{min-width:760px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 id="pageTitle">Totaux mensuels</h1>
        <p class="subtitle" id="pageSubtitle">Chargement…</p>
      </div>
      <div class="top-links">
        <a href="./index.html">Membres</a>
        <a href="./total.html">Totaux</a>
      </div>
    </div>

    <div class="summary" id="summary"></div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-key="label">Mois<span class="arrow"></span></th>
            <th class="sortable" data-key="memberCount">Joueurs<span class="arrow"></span></th>
            <th class="sortable" data-key="monthlyGain">Gain du mois<span class="arrow"></span></th>
            <th class="sortable" data-key="avgPerPlayer">Moyenne par joueur<span class="arrow"></span></th>
            <th class="sortable" data-key="activeCount">Actifs<span class="arrow"></span></th>
            <th class="sortable" data-key="avgPerActive">Moyenne par actif<span class="arrow"></span></th>
            <th class="sortable" data-key="clubTotalFans">Total fans club<span class="arrow"></span></th>
            <th class="sortable" data-key="monthlyRank">Rank club<span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="monthsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      sortKey: "label",
      sortDirection: "desc"
    };

    function formatNumber(value){
      return new Intl.NumberFormat("fr-FR").format(Number(value ?? 0));
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function compareRows(a, b, key, direction){
      const dir = direction === "asc" ? 1 : -1;
      let av = a[key];
      let bv = b[key];

      if (key === "label") {
        av = a.order;
        bv = b.order;
      }

      if (typeof av === "string" && typeof bv === "string") {
        return av.localeCompare(bv, "fr", { sensitivity:"base" }) * dir;
      }

      return (Number(av ?? 0) - Number(bv ?? 0)) * dir;
    }

    function renderSortArrows(){
      document.querySelectorAll("th.sortable").forEach(th => {
        const arrow = th.querySelector(".arrow");
        const key = th.dataset.key;
        arrow.textContent = key === state.sortKey ? (state.sortDirection === "asc" ? "▲" : "▼") : "";
      });
    }

    function renderSummary(){
      const totalMonths = state.rows.length;
      const totalGain = state.rows.reduce((sum, row) => sum + row.monthlyGain, 0);
      const avgPerMonth = totalMonths ? Math.round(totalGain / totalMonths) : 0;
      const globalPlayers = state.rows.reduce((sum, row) => sum + row.memberCount, 0);
      const globalAvgPerPlayer = globalPlayers ? Math.round(totalGain / globalPlayers) : 0;

      const items = [
        { label:"Mois suivis", value:formatNumber(totalMonths) },
        { label:"Gain cumulé", value:formatNumber(totalGain) },
        { label:"Moyenne par mois", value:formatNumber(avgPerMonth) },
        { label:"Moyenne globale / joueur", value:formatNumber(globalAvgPerPlayer) }
      ];

      document.getElementById("summary").innerHTML = items.map(item => `
        <div class="card summary-item">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join("");
    }

    function renderTable(){
      const rows = [...state.rows].sort((a,b) => compareRows(a,b,state.sortKey,state.sortDirection));
      const body = document.getElementById("monthsBody");

      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="8" class="empty">Aucun mois disponible.</td></tr>';
        renderSortArrows();
        return;
      }

      body.innerHTML = rows.map(row => `
        <tr>
          <td><a class="month-link" href="./index.html">${escapeHtml(row.label)}</a></td>
          <td>${formatNumber(row.memberCount)}</td>
          <td>${formatNumber(row.monthlyGain)}</td>
          <td>${formatNumber(row.avgPerPlayer)}</td>
          <td>${formatNumber(row.activeCount)}</td>
          <td>${formatNumber(row.avgPerActive)}</td>
          <td>${formatNumber(row.clubTotalFans)}</td>
          <td>${row.monthlyRank ? "#" + formatNumber(row.monthlyRank) : "—"}</td>
        </tr>
      `).join("");

      renderSortArrows();
    }

    async function loadData(){
      const manifestResponse = await fetch("./data/index.json");
      if (!manifestResponse.ok) throw new Error("Impossible de charger ./data/index.json");
      const manifest = await manifestResponse.json();
      if (!Array.isArray(manifest) || !manifest.length) throw new Error("Le manifest des mois est vide.");

      const datasets = await Promise.all(
        manifest.map(async (month, index) => {
          const response = await fetch(month.file);
          if (!response.ok) throw new Error(`Impossible de charger ${month.file}`);
          const data = await response.json();

          const members = Array.isArray(data.members) ? data.members : [];
          const history = Array.isArray(data.history) ? data.history : [];
          const circle = data.circle || {};

          const memberCount = Number(circle.member_count ?? members.length ?? 0);
          const activeCount = members.filter(member => member.isActive).length;
          const monthlyGain = members.reduce((sum, member) => sum + Number(member.monthly_gain || 0), 0);
          const avgPerPlayer = memberCount ? Math.round(monthlyGain / memberCount) : 0;
          const avgPerActive = activeCount ? Math.round(monthlyGain / activeCount) : 0;
          const clubTotalFans = history.length ? Number(history[history.length - 1].fan_count || 0) : 0;

          return {
            key: month.key,
            label: month.label,
            order: index,
            memberCount,
            activeCount,
            monthlyGain,
            avgPerPlayer,
            avgPerActive,
            clubTotalFans,
            monthlyRank: Number(circle.monthly_rank || 0)
          };
        })
      );

      state.rows = datasets;
      document.getElementById("pageSubtitle").textContent = "Gain mensuel du club avec moyenne par joueur.";
      renderSummary();
      renderTable();
    }

    function setupEvents(){
      document.querySelectorAll("th.sortable").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (state.sortKey === key) {
            state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
          } else {
            state.sortKey = key;
            state.sortDirection = "desc";
          }
          renderTable();
        });
      });
    }

    async function init(){
      setupEvents();
      await loadData();
    }

    init().catch(error => {
      document.getElementById("pageTitle").textContent = "Erreur de chargement";
      document.getElementById("pageSubtitle").textContent = error.message;
      console.error(error);
    });
  </script>
</body>
</html>
