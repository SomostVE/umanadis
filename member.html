<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membre - Uma Musume Club Dashboard</title>
  <style>
    :root{--panel:#171b2e;--panel-2:#1d233b;--border:#2b3354;--text:#edf1ff;--muted:#9ca8d4}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0d1020 0%, #131831 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    .container{width:min(1320px,calc(100% - 24px));margin:20px auto 40px}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}
    h1{margin:0 0 8px;font-size:30px;line-height:1.1}.subtitle{color:var(--muted);margin:0}.top-links{display:flex;gap:10px;flex-wrap:wrap}
    .top-links a{text-decoration:none;color:var(--text);background:rgba(23,27,46,.94);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-weight:700}
    .card{background:rgba(23,27,46,.94);border:1px solid var(--border);border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.25)}
    .month-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;margin-bottom:16px;flex-wrap:wrap}.month-nav button{border:1px solid var(--border);background:var(--panel-2);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:700}.month-nav button:hover:not(:disabled){background:#253055}.month-nav button:disabled{opacity:.4;cursor:not-allowed}.month-label{min-width:220px;text-align:center;font-size:18px;font-weight:800}
    .summary{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:12px;margin-bottom:16px}.summary-item{padding:16px}.summary-item .label{color:var(--muted);font-size:13px;margin-bottom:6px}.summary-item .value{font-size:22px;font-weight:800;line-height:1.15;overflow-wrap:anywhere}
    .table-wrap{overflow-x:auto} table{width:100%;border-collapse:collapse;min-width:820px} th,td{padding:12px;border-bottom:1px solid rgba(43,51,84,.75);text-align:left;vertical-align:middle;font-size:14px} th{background:rgba(29,35,59,.98);font-size:13px;color:var(--text);white-space:normal;line-height:1.25;word-break:break-word} tbody tr:hover{background:rgba(141,180,255,.06)} .empty{padding:24px;color:var(--muted)}
    @media (max-width:1100px){.summary{grid-template-columns:repeat(3,minmax(0,1fr))}} @media (max-width:640px){.summary{grid-template-columns:repeat(2,minmax(0,1fr))}h1{font-size:24px}.container{width:min(100%,calc(100% - 16px))}table{min-width:720px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 id="pageTitle">Membre</h1>
        <p class="subtitle" id="pageSubtitle"></p>
      </div>
      <div class="top-links">
        <a id="backMembers" href="./index.html">Membres</a>
        <a id="backTotals" href="./total.html">Totaux</a>
      </div>
    </div>
    <div class="card month-nav">
      <button id="prevMonthBtn">← Mois précédent</button>
      <div class="month-label" id="monthLabel">—</div>
      <button id="nextMonthBtn">Mois suivant →</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>Jour</th><th>Total fans</th><th>Gain du jour</th></tr></thead>
        <tbody id="memberHistoryBody"></tbody>
      </table>
    </div>
  </div>
  <script>
    const state={manifest:[],monthIndex:0,data:null,memberId:null};
    const formatNumber=v=>new Intl.NumberFormat("fr-FR").format(Number(v??0));
    const formatDate=v=>{if(!v)return "—";const d=new Date(v);return new Intl.DateTimeFormat("fr-FR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}).format(d);};
    const getQueryParams=()=>{const p=new URLSearchParams(window.location.search);return {month:p.get("month"),id:p.get("id")};};
    async function loadManifest(){const r=await fetch("./data/index.json");if(!r.ok)throw new Error("Impossible de charger ./data/index.json");state.manifest=await r.json();if(!Array.isArray(state.manifest)||!state.manifest.length)throw new Error("Le manifest des mois est vide.");}
    const resolveMonthIndex=monthKey=>{const found=state.manifest.findIndex(item=>item.key===monthKey);return found>=0?found:0;};
    async function loadMonth(index){state.monthIndex=index;const month=state.manifest[index];const r=await fetch(month.file);if(!r.ok)throw new Error(`Impossible de charger ${month.file}`);state.data=await r.json();renderMonthButtons();renderMember();updateLinks();}
    function renderMonthButtons(){document.getElementById("prevMonthBtn").disabled=state.monthIndex<=0;document.getElementById("nextMonthBtn").disabled=state.monthIndex>=state.manifest.length-1;document.getElementById("monthLabel").textContent=state.manifest[state.monthIndex]?.label||"—";}
    function updateLinks(){const monthKey=state.manifest[state.monthIndex]?.key||"";document.getElementById("backMembers").href="./index.html";document.getElementById("backTotals").href=`./total.html?month=${encodeURIComponent(monthKey)}`;}
    function renderMember(){const members=state.data.members||[];const member=members.find(m=>String(m.trainer_id)===String(state.memberId));if(!member){document.getElementById("pageTitle").textContent="Membre introuvable";document.getElementById("pageSubtitle").textContent="";document.getElementById("summary").innerHTML="";document.getElementById("memberHistoryBody").innerHTML='<tr><td colspan="3" class="empty">Aucun membre trouvé pour cet identifiant.</td></tr>';return;}document.getElementById("pageTitle").textContent=member.name;document.getElementById("pageSubtitle").textContent=`ID ${member.trainer_id}`;const items=[{label:"Status",value:member.isActive?"Actif":"Inactif"},{label:"Role",value:member.role||"member"},{label:"Monthly gain",value:formatNumber(member.monthly_gain)},{label:"Daily gain",value:formatNumber(member.daily_gain)},{label:"7 day average",value:formatNumber(Math.round(member.seven_day_avg||0))},{label:"Total fans",value:formatNumber(member.fan_count)},{label:"Last update",value:formatDate(member.last_updated)}];document.getElementById("summary").innerHTML=items.map(item=>`<div class="card summary-item"><div class="label">${item.label}</div><div class="value">${item.value}</div></div>`).join("");const fans=Array.isArray(member.daily_fans)?member.daily_fans:[],delta=Array.isArray(member.daily_delta)?member.daily_delta:[],rows=[];for(let i=0;i<Math.max(fans.length,delta.length);i++){const fansValue=fans[i],deltaValue=delta[i];if(fansValue===0&&deltaValue==null)continue;rows.push({day:i+1,fans:fansValue,delta:deltaValue});}document.getElementById("memberHistoryBody").innerHTML=rows.map(row=>`<tr><td>${row.day}</td><td>${row.fans?formatNumber(row.fans):"—"}</td><td>${row.delta==null?"—":formatNumber(row.delta)}</td></tr>`).join("");}
    function setupEvents(){document.getElementById("prevMonthBtn").addEventListener("click",()=>{if(state.monthIndex>0){const monthKey=state.manifest[state.monthIndex-1]?.key||"";window.location.href=`./member.html?month=${encodeURIComponent(monthKey)}&id=${encodeURIComponent(state.memberId)}`;}});document.getElementById("nextMonthBtn").addEventListener("click",()=>{if(state.monthIndex<state.manifest.length-1){const monthKey=state.manifest[state.monthIndex+1]?.key||"";window.location.href=`./member.html?month=${encodeURIComponent(monthKey)}&id=${encodeURIComponent(state.memberId)}`;}});}
    async function init(){const params=getQueryParams();state.memberId=params.id;setupEvents();await loadManifest();await loadMonth(resolveMonthIndex(params.month));}
    init().catch(error=>{document.getElementById("pageTitle").textContent="Erreur de chargement";document.getElementById("pageSubtitle").textContent=error.message;console.error(error);});
  </script>
</body>
</html>
