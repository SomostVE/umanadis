<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totaux - Uma Musume Club Dashboard</title>
  <style>
:root{
  --panel:rgba(255,255,255,.88);
  --panel-strong:#ffffff;
  --border:#dbe7ff;
  --text:#294064;
  --muted:#6e85ad;
  --pink:#ff77b7;
  --pink-soft:#ffd8ea;
  --blue:#6fa8ff;
  --blue-soft:#deedff;
  --yellow:#ffd86b;
  --yellow-soft:#fff4c8;
  --mint:#66d6b8;
  --mint-soft:#d9fff4;
  --danger:#ff7b9c;
  --danger-soft:#ffe2ea;
  --shadow:0 12px 40px rgba(122,147,201,.16);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    linear-gradient(rgba(255,245,251,.82), rgba(238,247,255,.84)),
    url('./assets/images/fond.png') center center / cover fixed no-repeat;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at top left, rgba(255,119,183,.14), transparent 28%),
    radial-gradient(circle at top right, rgba(111,168,255,.14), transparent 30%),
    linear-gradient(135deg, rgba(255,255,255,.24), transparent 35%);
  opacity:.9;
}
.container{
  position:relative;
  z-index:1;
  width:min(1320px, calc(100% - 24px));
  margin:24px auto 40px;
}
.header{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:16px;
  animation:fadeUp .55s ease both;
}
h1{
  margin:0 0 8px;
  font-size:32px;
  line-height:1.08;
  letter-spacing:-.02em;
}
.subtitle{
  color:var(--muted);
  margin:0;
  font-size:15px;
}
.top-links{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.top-links a,.seg button,.select-wrap select{
  text-decoration:none;
  color:var(--text);
  background:rgba(255,255,255,.78);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 14px;
  font-weight:700;
  box-shadow:var(--shadow);
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
}
.top-links a:hover,.seg button:hover,.select-wrap select:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 40px rgba(122,147,201,.22);
  border-color:#bfd5ff;
  background:#fff;
}
.top-links a.active,.seg button.active{
  background:linear-gradient(135deg, #ffffff 0%, var(--blue-soft) 100%);
  border-color:#b9d3ff;
}
.card{
  background:var(--panel);
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:22px;
  box-shadow:var(--shadow);
  animation:fadeUp .55s ease both;
}
.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:16px;
  align-items:center;
  animation:fadeUp .6s ease both;
}
.seg{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.select-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}
.select-wrap label{
  font-size:13px;
  font-weight:800;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.04em;
}
.select-wrap select{
  padding-right:34px;
  appearance:none;
}
.summary{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}
.summary-item{
  padding:18px;
  position:relative;
  overflow:hidden;
}
.summary-item::after{
  content:"";
  position:absolute;
  width:90px;
  height:90px;
  border-radius:50%;
  background:linear-gradient(135deg, rgba(255,255,255,.5), rgba(255,255,255,0));
  right:-20px;
  top:-20px;
}
.summary-item .label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.04em;
  font-weight:800;
}
.summary-item .value{
  font-size:25px;
  font-weight:900;
  line-height:1.1;
  overflow-wrap:anywhere;
}
.summary-item:nth-child(1){background:linear-gradient(135deg,#fff,#f7fbff)}
.summary-item:nth-child(2){background:linear-gradient(135deg,#fffaf1,#fff)}
.summary-item:nth-child(3){background:linear-gradient(135deg,#fff2f8,#fff)}
.summary-item:nth-child(4){background:linear-gradient(135deg,#f3fff9,#fff)}
.intro{
  padding:14px 16px;
  margin-bottom:16px;
  color:#5576a7;
  font-weight:700;
}
.table-wrap{overflow-x:auto}
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:840px;
}
th, td{
  padding:13px 12px;
  border-bottom:1px solid #e7efff;
  text-align:left;
  vertical-align:middle;
  font-size:14px;
  background:transparent;
}
th{
  font-size:13px;
  color:#5d7fb0;
  white-space:normal;
  line-height:1.25;
  word-break:break-word;
  font-weight:900;
  letter-spacing:.03em;
  text-transform:uppercase;
  background:rgba(245,249,255,.95);
}
th:first-child{border-top-left-radius:20px}
th:last-child{border-top-right-radius:20px}
th.sortable{cursor:pointer;user-select:none}
th .arrow{margin-left:6px;color:#90a8d2;font-size:11px}
tbody tr{
  transition:transform .15s ease, background .15s ease;
  animation:fadeUp .45s ease both;
  animation-delay:var(--row-delay,0ms);
}
tbody tr:hover{
  background:rgba(255,255,255,.55);
  transform:translateY(-1px);
}
.month-link{
  color:#2c64b2;
  text-decoration:none;
  font-weight:900;
}
.month-link:hover{text-decoration:underline}
.note{
  margin-top:12px;
  color:var(--muted);
  font-size:13px;
}
.empty{
  padding:24px;
  color:var(--muted);
}
.hidden{
  display:none !important;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@media (max-width:1100px){
  .summary{grid-template-columns:repeat(2, minmax(0,1fr))}
}
@media (max-width:640px){
  .summary{grid-template-columns:1fr}
  h1{font-size:25px}
  .container{width:min(100%, calc(100% - 16px))}
  table{min-width:760px}
}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 id="pageTitle">Totaux</h1>
        <p class="subtitle" id="pageSubtitle">Chargement…</p>
      </div>
      <div class="top-links">
        <a href="./index_v2.html">Membres</a>
        <a class="active" href="./total_v4.html">Totaux</a>
        <a href="./graph.html">Graph</a>
      </div>
    </div>

    <div class="controls">
      <div class="seg">
        <button id="modeMonthBtn" class="active">Par mois</button>
        <button id="modeTotalBtn">Total cumulé</button>
      </div>
      <div class="select-wrap" id="monthSelectWrap">
        <label for="monthSelect">Mois</label>
        <select id="monthSelect"></select>
      </div>
    </div>

    <div class="card intro" id="introText"></div>

    <div class="summary" id="summary"></div>

    <div class="card table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="note" id="tableNote"></div>
    </div>
  </div>

  <script>
    const state = {
      manifest: [],
      rows: [],
      monthIndex: 0,
      mode: "month",
      sortKey: "label",
      sortDirection: "desc"
    };

    const nf = new Intl.NumberFormat("fr-FR");

    function formatNumber(value){
      return nf.format(Number(value ?? 0));
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function compareRows(a,b,key,direction){
      const dir = direction === "asc" ? 1 : -1;
      let av = a[key];
      let bv = b[key];
      if (key === "label"){
        av = a.order;
        bv = b.order;
      }
      if (typeof av === "string" && typeof bv === "string"){
        return av.localeCompare(bv, "fr", {sensitivity:"base"}) * dir;
      }
      return (Number(av ?? 0) - Number(bv ?? 0)) * dir;
    }

    function renderSortArrows(){
      document.querySelectorAll("th.sortable").forEach(th => {
        const arrow = th.querySelector(".arrow");
        arrow.textContent = th.dataset.key === state.sortKey ? (state.sortDirection === "asc" ? "▲" : "▼") : "";
      });
    }

    async function loadData(){
      const manifestResponse = await fetch("./data/index.json");
      if (!manifestResponse.ok) throw new Error("Impossible de charger ./data/index.json");
      const manifest = await manifestResponse.json();
      if (!Array.isArray(manifest) || !manifest.length) throw new Error("Le manifest des mois est vide.");

      state.manifest = manifest;
      state.rows = await Promise.all(manifest.map(async (month,index) => {
        const res = await fetch(month.file);
        if (!res.ok) throw new Error("Impossible de charger " + month.file);
        const data = await res.json();
        const members = Array.isArray(data.members) ? data.members : [];
        const history = Array.isArray(data.history) ? data.history : [];
        const monthlyGain = members.reduce((sum,m) => sum + Number(m.monthly_gain || 0), 0);
        const avgPerPlayer = members.length ? Math.round(monthlyGain / members.length) : 0;
        const clubTotalFans = history.length ? Number(history[history.length - 1].fan_count || 0) : 0;

        return {
          key: month.key,
          label: month.label,
          order: index,
          monthlyGain,
          avgPerPlayer,
          clubTotalFans
        };
      }));

      const select = document.getElementById("monthSelect");
      select.innerHTML = state.rows.map((row,index) => `<option value="${index}">${escapeHtml(row.label)}</option>`).join("");
      state.monthIndex = Math.max(0, state.rows.length - 1);
      select.value = String(state.monthIndex);
    }

    function renderModeButtons(){
      document.getElementById("modeMonthBtn").classList.toggle("active", state.mode === "month");
      document.getElementById("modeTotalBtn").classList.toggle("active", state.mode === "total");
      document.getElementById("monthSelectWrap").classList.toggle("hidden", state.mode !== "month");
    }

    function renderSummaryMonth(){
      const row = state.rows[state.monthIndex];
      const items = [
        {label:"Mois", value: row?.label || "—"},
        {label:"Gain du mois", value: formatNumber(row?.monthlyGain || 0)},
        {label:"Moyenne par joueur", value: formatNumber(row?.avgPerPlayer || 0)},
        {label:"Total fans club", value: formatNumber(row?.clubTotalFans || 0)}
      ];

      document.getElementById("summary").innerHTML = items.map(item =>
        `<div class="card summary-item"><div class="label">${item.label}</div><div class="value">${item.value}</div></div>`
      ).join("");

      document.getElementById("introText").textContent = "Vue mensuelle : tu sélectionnes un mois dans le sous-menu et tu vois uniquement ses totaux.";
    }

    function renderSummaryTotal(){
      const totalMonths = state.rows.length;
      const totalGain = state.rows.reduce((sum,row)=>sum+row.monthlyGain,0);
      const avgPerMonth = totalMonths ? Math.round(totalGain / totalMonths) : 0;
      const avgPerPlayer = totalMonths ? Math.round(state.rows.reduce((sum,row)=>sum+row.avgPerPlayer,0) / totalMonths) : 0;

      const items = [
        {label:"Mois suivis", value: formatNumber(totalMonths)},
        {label:"Gain cumulé", value: formatNumber(totalGain)},
        {label:"Moyenne / mois", value: formatNumber(avgPerMonth)},
        {label:"Moyenne / joueur", value: formatNumber(avgPerPlayer)}
      ];

      document.getElementById("summary").innerHTML = items.map(item =>
        `<div class="card summary-item"><div class="label">${item.label}</div><div class="value">${item.value}</div></div>`
      ).join("");

      document.getElementById("introText").textContent = "Vue total cumulé : tu compares tous les mois disponibles en une seule table.";
    }

    function renderMonthTable(){
      const row = state.rows[state.monthIndex];
      document.getElementById("tableHead").innerHTML = `
        <tr>
          <th>Mois</th>
          <th>Gain du mois</th>
          <th>Moyenne par joueur</th>
          <th>Total fans club</th>
        </tr>
      `;
      document.getElementById("tableBody").innerHTML = row ? `
        <tr style="--row-delay:0ms">
          <td><a class="month-link" href="./index_v2.html?month=${encodeURIComponent(row.key)}">${escapeHtml(row.label)}</a></td>
          <td>${formatNumber(row.monthlyGain)}</td>
          <td>${formatNumber(row.avgPerPlayer)}</td>
          <td>${formatNumber(row.clubTotalFans)}</td>
        </tr>
      ` : `<tr><td colspan="4" class="empty">Aucun mois disponible.</td></tr>`;
      document.getElementById("tableNote").textContent = "";
    }

    function renderTotalTable(){
      const rows = [...state.rows].sort((a,b)=>compareRows(a,b,state.sortKey,state.sortDirection));

      document.getElementById("tableHead").innerHTML = `
        <tr>
          <th class="sortable" data-key="label">Mois<span class="arrow"></span></th>
          <th class="sortable" data-key="monthlyGain">Gain du mois<span class="arrow"></span></th>
          <th class="sortable" data-key="avgPerPlayer">Moyenne par joueur<span class="arrow"></span></th>
          <th class="sortable" data-key="clubTotalFans">Total fans club<span class="arrow"></span></th>
        </tr>
      `;

      document.getElementById("tableBody").innerHTML = rows.length ? rows.map((row,index) => `
        <tr style="--row-delay:${index * 18}ms">
          <td><a class="month-link" href="./index_v2.html?month=${encodeURIComponent(row.key)}">${escapeHtml(row.label)}</a></td>
          <td>${formatNumber(row.monthlyGain)}</td>
          <td>${formatNumber(row.avgPerPlayer)}</td>
          <td>${formatNumber(row.clubTotalFans)}</td>
        </tr>
      `).join("") : `<tr><td colspan="4" class="empty">Aucun mois disponible.</td></tr>`;

      document.getElementById("tableNote").textContent = "";
      bindTableSort();
      renderSortArrows();
    }

    function bindTableSort(){
      document.querySelectorAll("th.sortable").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (state.sortKey === key){
            state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
          } else {
            state.sortKey = key;
            state.sortDirection = "desc";
          }
          if (state.mode === "total"){
            renderTotalTable();
          }
        });
      });
    }

    function render(){
      renderModeButtons();
      if (state.mode === "month"){
        renderSummaryMonth();
        renderMonthTable();
      } else {
        renderSummaryTotal();
        renderTotalTable();
      }
      document.getElementById("pageSubtitle").textContent = "Totaux du club avec une séparation claire entre vue mensuelle et total cumulé.";
    }

    function setupEvents(){
      document.getElementById("modeMonthBtn").addEventListener("click", () => {
        state.mode = "month";
        render();
      });

      document.getElementById("modeTotalBtn").addEventListener("click", () => {
        state.mode = "total";
        render();
      });

      document.getElementById("monthSelect").addEventListener("change", (e) => {
        state.monthIndex = Number(e.target.value);
        if (state.mode === "month"){
          render();
        }
      });
    }

    async function init(){
      setupEvents();
      await loadData();
      render();
    }

    init().catch(error => {
      document.getElementById("pageTitle").textContent = "Erreur de chargement";
      document.getElementById("pageSubtitle").textContent = error.message;
      console.error(error);
    });
  </script>
</body>
</html>
