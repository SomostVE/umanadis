<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totaux mensuels - Uma Musume Club</title>
  <style>
:root{
  --panel:rgba(255,255,255,.88);
  --border:#dbe7ff;
  --text:#294064;
  --text-strong:#1f3659;
  --muted:#4a648f;
  --blue-soft:#deedff;
  --shadow:0 12px 40px rgba(122,147,201,.16);
  --up:#198f63;
  --up-bg:rgba(25,143,99,.10);
  --down:#c45472;
  --down-bg:rgba(196,84,114,.10);
  --neutral:#6f86ab;
}
*{box-sizing:border-box}
html, body{
  margin:0;
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:url('./assets/images/fond.png') center center / cover fixed no-repeat;
  overflow-x:hidden;
}
body{
  padding:24px 0;
}
.container{
  position:relative;
  z-index:1;
  width:min(1320px, calc(100% - 24px));
  margin:0 auto;
}
.header{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:16px;
  animation:fadeUp .55s ease both;
}
h1{
  margin:0 0 8px;
  font-size:32px;
  line-height:1.08;
  letter-spacing:-.02em;
  color:var(--text-strong);
}
.top-links{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.top-links a{
  text-decoration:none;
  color:var(--text-strong);
  background:rgba(255,255,255,.82);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 14px;
  font-weight:800;
  box-shadow:0 12px 40px rgba(122,147,201,.16);
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
}
.top-links a:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 40px rgba(122,147,201,.22);
  border-color:#bfd5ff;
  background:#fff;
}
.top-links a.active{
  background:linear-gradient(135deg, #ffffff 0%, var(--blue-soft) 100%);
  border-color:#b9d3ff;
}
.card{
  background:var(--panel);
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:22px;
  box-shadow:0 12px 40px rgba(122,147,201,.16);
  animation:fadeUp .55s ease both;
}
.summary{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:12px;
  margin-bottom:16px;
}
.summary-item{
  padding:18px;
  position:relative;
  overflow:hidden;
}
.summary-item::after{
  content:"";
  position:absolute;
  width:90px;
  height:90px;
  border-radius:50%;
  background:linear-gradient(135deg, rgba(255,255,255,.5), rgba(255,255,255,0));
  right:-20px;
  top:-20px;
}
.summary-item .label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.04em;
  font-weight:800;
}
.summary-item .value{
  font-size:26px;
  font-weight:900;
  line-height:1.1;
  overflow-wrap:anywhere;
  color:var(--text-strong);
}
.summary-item:nth-child(1){background:linear-gradient(135deg,#fff,#f7fbff)}
.summary-item:nth-child(2){background:linear-gradient(135deg,#fffaf1,#fff)}
.summary-item:nth-child(3){background:linear-gradient(135deg,#fff2f8,#fff)}
.summary-item:nth-child(4){background:linear-gradient(135deg,#f3fff9,#fff)}
.table-wrap{
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
}
.table-wrap::-webkit-scrollbar{
  width:0;
  height:0;
}
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:1040px;
}
th, td{
  padding:16px 14px;
  border-bottom:1px solid #dbe7ff;
  text-align:left;
  vertical-align:middle;
  font-size:16px;
  background:rgba(255,255,255,.64);
  color:var(--text-strong);
}
th{
  font-size:14px;
  color:#4d6f9f;
  white-space:normal;
  line-height:1.25;
  word-break:break-word;
  font-weight:900;
  letter-spacing:.03em;
  text-transform:uppercase;
  background:rgba(245,249,255,.96);
}
th:first-child{border-top-left-radius:20px}
th:last-child{border-top-right-radius:20px}
th.sortable{
  cursor:pointer;
  user-select:none;
}
th .arrow{
  margin-left:6px;
  color:#7f9aca;
  font-size:11px;
}
tbody tr{
  transition:transform .15s ease, background .15s ease;
  animation:fadeUp .45s ease both;
  animation-delay:var(--row-delay,0ms);
}
tbody tr:hover{
  background:rgba(255,255,255,.78);
  transform:translateY(-1px);
}
tbody tr:hover td{
  background:rgba(255,255,255,.78);
}
td{
  font-weight:800;
}
.month-link{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:10px;
  text-decoration:none;
  color:var(--text-strong);
  font-weight:900;
  background:rgba(255,255,255,.78);
  border:1px solid #dbe7ff;
  box-shadow:0 6px 18px rgba(122,147,201,.10);
  transition:transform .15s ease, background .15s ease, border-color .15s ease;
}
.month-link:hover{
  transform:translateY(-1px);
  background:#fff;
  border-color:#bfd5ff;
}
.metric{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.delta{
  display:inline-flex;
  align-items:center;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  line-height:1;
}
.delta.up{
  color:var(--up);
  background:var(--up-bg);
}
.delta.down{
  color:var(--down);
  background:var(--down-bg);
}
.delta.neutral{
  color:var(--neutral);
  background:rgba(111,134,171,.10);
}
.empty{
  padding:24px;
  color:var(--muted);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@media (max-width:1100px){
  .summary{grid-template-columns:repeat(2, minmax(0,1fr))}
}
@media (max-width:640px){
  body{padding:16px 0;}
  .summary{grid-template-columns:1fr}
  h1{font-size:25px}
  .container{width:min(100%, calc(100% - 16px))}
  table{min-width:920px}
  th, td{font-size:14px}
}
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div>
        <h1 id="pageTitle">Totaux mensuels</h1>
      </div>
      <div class="top-links">
        <a href="./index.html">Membres</a>
        <a class="active" href="./total.html">Totaux</a>
        <a href="./graph.html">Graph</a>
      </div>
    </div>

    <div class="summary" id="summary"></div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-key="label">Mois<span class="arrow"></span></th>
            <th class="sortable" data-key="monthlyGain">Gain du mois<span class="arrow"></span></th>
            <th class="sortable" data-key="avgPerPlayer">Moyenne par joueur<span class="arrow"></span></th>
            <th class="sortable" data-key="clubTotalFans">Total fans club<span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="monthsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const state = { rows: [], sortKey: "label", sortDirection: "desc" };
    const nf = new Intl.NumberFormat("fr-FR");
    const pf = new Intl.NumberFormat("fr-FR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });

    function formatNumber(value){ return nf.format(Number(value ?? 0)); }
    function formatPercent(value){ return pf.format(value) + " %"; }
    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function computeDelta(current, previous){
      if (previous == null || previous === 0) return null;
      return ((current - previous) / previous) * 100;
    }

    function renderDelta(delta){
      if (delta == null) return '<span class="delta neutral">—</span>';
      if (delta > 0) return `<span class="delta up">(+ ${formatPercent(delta)})</span>`;
      if (delta < 0) return `<span class="delta down">(${formatPercent(delta)})</span>`;
      return '<span class="delta neutral">(0,0 %)</span>';
    }

    function compareRows(a,b,key,direction){
      const dir = direction === "asc" ? 1 : -1;
      let av=a[key], bv=b[key];
      if (key === "label"){ av=a.order; bv=b.order; }
      if (typeof av === "string" && typeof bv === "string"){
        return av.localeCompare(bv,"fr",{sensitivity:"base"}) * dir;
      }
      return (Number(av ?? 0)-Number(bv ?? 0)) * dir;
    }

    function renderSortArrows(){
      document.querySelectorAll("th.sortable").forEach(th => {
        th.querySelector(".arrow").textContent = th.dataset.key === state.sortKey
          ? (state.sortDirection === "asc" ? "▲" : "▼")
          : "";
      });
    }

    function renderSummary(){
      const totalMonths = state.rows.length;
      const totalGain = state.rows.reduce((sum,row)=>sum+row.monthlyGain,0);
      const avgPerMonth = totalMonths ? Math.round(totalGain / totalMonths) : 0;
      const avgPerPlayer = totalMonths
        ? Math.round(state.rows.reduce((sum,row)=>sum+row.avgPerPlayer,0) / totalMonths)
        : 0;

      const items = [
        {label:"Mois suivis", value:formatNumber(totalMonths)},
        {label:"Gain cumulé", value:formatNumber(totalGain)},
        {label:"Moyenne / mois", value:formatNumber(avgPerMonth)},
        {label:"Moyenne / joueur", value:formatNumber(avgPerPlayer)}
      ];

      document.getElementById("summary").innerHTML = items.map(item => `
        <div class="card summary-item">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join("");
    }

    function renderTable(){
      const rows = [...state.rows].sort((a,b)=>compareRows(a,b,state.sortKey,state.sortDirection));

      if (!rows.length){
        document.getElementById("monthsBody").innerHTML = '<tr><td colspan="4" class="empty">Aucun mois disponible.</td></tr>';
        renderSortArrows();
        return;
      }

      document.getElementById("monthsBody").innerHTML = rows.map((row,index)=>`
        <tr style="--row-delay:${index * 18}ms">
          <td><a class="month-link" href="./index.html?month=${encodeURIComponent(row.key)}">${escapeHtml(row.label)}</a></td>
          <td><div class="metric"><span>${formatNumber(row.monthlyGain)}</span>${renderDelta(row.monthlyGainDelta)}</div></td>
          <td><div class="metric"><span>${formatNumber(row.avgPerPlayer)}</span>${renderDelta(row.avgPerPlayerDelta)}</div></td>
          <td><div class="metric"><span>${formatNumber(row.clubTotalFans)}</span>${renderDelta(row.clubTotalFansDelta)}</div></td>
        </tr>
      `).join("");

      renderSortArrows();
    }

    async function loadData(){
      const manifestResponse = await fetch("./data/index.json");
      if (!manifestResponse.ok) throw new Error("Impossible de charger ./data/index.json");
      const manifest = await manifestResponse.json();
      if (!Array.isArray(manifest) || !manifest.length) throw new Error("Le manifest des mois est vide.");

      const baseRows = await Promise.all(manifest.map(async (month,index)=>{
        const res = await fetch(month.file);
        if (!res.ok) throw new Error("Impossible de charger " + month.file);
        const data = await res.json();
        const members = Array.isArray(data.members) ? data.members : [];
        const history = Array.isArray(data.history) ? data.history : [];
        const monthlyGain = members.reduce((sum,m)=>sum+Number(m.monthly_gain || 0),0);
        const avgPerPlayer = members.length ? Math.round(monthlyGain / members.length) : 0;
        const clubTotalFans = history.length ? Number(history[history.length-1].fan_count || 0) : 0;
        return { key:month.key, label:month.label, order:index, monthlyGain, avgPerPlayer, clubTotalFans };
      }));

      state.rows = baseRows.map((row,index)=> {
        const previous = index > 0 ? baseRows[index - 1] : null;
        return {
          ...row,
          monthlyGainDelta: computeDelta(row.monthlyGain, previous?.monthlyGain),
          avgPerPlayerDelta: computeDelta(row.avgPerPlayer, previous?.avgPerPlayer),
          clubTotalFansDelta: computeDelta(row.clubTotalFans, previous?.clubTotalFans)
        };
      });

      renderSummary();
      renderTable();
    }

    function setupEvents(){
      document.querySelectorAll("th.sortable").forEach(th=>{
        th.addEventListener("click",()=>{
          const key = th.dataset.key;
          if (state.sortKey===key){
            state.sortDirection = state.sortDirection==="asc" ? "desc" : "asc";
          } else {
            state.sortKey = key;
            state.sortDirection = "desc";
          }
          renderTable();
        });
      });
    }

    async function init(){
      setupEvents();
      await loadData();
    }

    init().catch(error=>{
      document.getElementById("pageTitle").textContent = "Erreur de chargement";
      console.error(error);
    });
  </script>

</body>
</html>
